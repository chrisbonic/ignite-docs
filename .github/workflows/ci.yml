name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Format check
        if: always()
        run: npm run format:check
      - name: Typecheck
        if: always()
        run: npm run typecheck
      - name: Build
        if: always()
        run: npm run build
